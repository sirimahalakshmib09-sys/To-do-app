<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="submit.php" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br>
        <br>
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="first_name" required>
        <br>
        <br>
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="last_name" required>
        <br>
        <br>
        <label for="regdno">Registration Number:</label>
        <input type="text" id="regdno" name="red_gno" required>
        <br>
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="date_of_birth" required>
        <br>
        <br>
                <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Prefer not to say</label><br>
               <label>Skills:</label><br>
        <input type="checkbox" id="frontend" name="skills[]" value="frontend">
        <label for="frontend">Frontend</label><br>
        <input type="checkbox" id="backend" name="skills[]" value="backend">
        <label for="backend">Backend</label><br>
        <input type="checkbox" id="fullstack" name="skills[]" value="fullstack">
        <label for="fullstack">Fullstack</label><br>
        <label for="dept">Department:</label>
  <select id="dept" name="department">
  <option>CSE</option>
  <option>CST</option>
  <option>CSM</option>
  <option>CSD</option>
  <option>CIC</option>
  <option>ECE</option>
  <option>ECT</option>
  <option>CIVIL</option>
  <option>MECHANICAL</option>
  </select>
<br><br>
<label for="email">Email:</label>
<input type="email" id="email" name="email" placeholder="student@example.com" required>
<br><br>

<label for="phone">Phone Number:</label>
<input type="tel" id="phone" name="phone" placeholder="1234567890" required>
<br><br>

<label for="address">Address:</label>
<input type="text" id="address" name="address" required>
<br><br>
    </form>
</body>
</html>
